<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colorfly Studio</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- HEADER: cabecera del proyecto -->
    <header>
      <h1>Generador de Paletas de Colores 🎨</h1>
    </header>

    <!-- MAIN: contenido principal del proyecto -->
    <main>
      <!-- Controles para generar las paletas dinámicas -->
      <section class="controles">
        <!-- Tamaño de la paleta de colores -->
        <label for="tamano">Elige el tamaño:</label>
        <select name="cantidad" id="cantidad">
          <option value="6">6 colores</option>
          <option value="8">8 colores</option>
          <option value="9">9 colores</option>
        </select>

        <!-- Formato de colores -->
        <label for="formato">Elige el formato:</label>
        <select id="formato">
          <option value="HSL">HSL</option>
          <option value="HEX">Hexadecimal</option>
        </select>

        <!-- Boton para generar la paleta de colores -->
        <button class="generar-paleta">Generar Paleta</button>
      </section>

      <!-- Área de la paleta de colores -->
      <section class="area-colores">
        <!-- Sección se llena con la paleta de colores generada -->
      </section>
    </main>

    <!-- PIE DE PÁGINA del sitio web -->
    <footer>
      <p>© 2026 Colorfly Studio. Todos los derechos reservados.</p>
    </footer>

    <!-- Script enlazado -->
    <script src="js/script.js"></script>
  </body>
</html>
